name: farm_protection_system
description: "Wildlife Detection and Farm Protection System"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP API requests
  http: ^1.2.0

  # Realtime detection alerts
  socket_io_client: ^2.0.3

  # Location services
  geolocator: ^10.1.0
  geocoding: ^2.1.1

  # Image caching
  cached_network_image: ^3.3.1

  # 🔥 ADD THIS (CORRECT PLACE)
  flutter_webrtc: ^0.12.0

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0

  # Animations & charts
  flutter_animate: ^4.5.0
  fl_chart: ^1.1.1

  # Audio alerts
  audioplayers: ^6.6.0
  gal: ^2.3.2
  permission_handler: ^12.0.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  color: "#1E5A46"
  android: true
  ios: false
  android_12:
    color: "#1E5A46"
  web: false

flutter:
  uses-material-design: true

  # If you later store local images
  assets:
    - assets/images/
    - assets/sounds/